name: Trigger Newcomer Detection

on:
  schedule:
    - cron: '0 3 * * 1-5'
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Send trigger message to Feishu
        run: |
          curl -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"msg_type":"text","content":{"text":"检测新人入群情况"}}'          
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
